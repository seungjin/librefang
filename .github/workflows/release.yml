  # ═════════════════════════════════════════════════════════════════════════
  # Aggregate per-asset *.sha256 sibling files into one SHA256SUMS manifest
  # and sign it with cosign keyless (Sigstore + GitHub OIDC). See #3546.
  #
  # Why an aggregator instead of signing each `*.sha256` in place:
  #   - One signature per release (vs ~20) is cheaper for verifiers.
  #   - `install.sh` only has to fetch+verify two files (SHA256SUMS,
  #     SHA256SUMS.sig) and the cert bundle, regardless of platform count.
  #   - Matches the layout most upstream Rust tooling (rustup, sigstore-rs)
  #     already understands.
  #
  # Keyless signing uses the workflow's OIDC identity, so no long-lived
  # secret is required. Verifiers re-derive trust from:
  #     --certificate-identity-regexp "https://github\.com/librefang/librefang/.*"
  #     --certificate-oidc-issuer     "https://token.actions.githubusercontent.com"
  #
  # SLSA build-provenance attestation (`actions/attest-build-provenance`) is
  # tracked as a follow-up — it requires touching every per-target packaging
  # step to stamp `subject-path:`, which is out of scope for this PR.
  # ═════════════════════════════════════════════════════════════════════════

  sign_release_artifacts:
    name: Sign Release Artifacts
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    needs:
      - create_release
      - cli_mac
      - cli_linux
      - cli_android
      - cli_linux_mini
      - cli_musl
      - cli_windows
      - cli_mac_mini
      - cli_windows_mini
    runs-on: ubuntu-latest
    permissions:
      contents: write   # upload signed manifest as release asset
      id-token: write   # fetch OIDC token for cosign keyless signing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v2.6.3"

      - name: Build SHA256SUMS manifest from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$RELEASE_TAG"
          mkdir -p sums
          cd sums

          # Pull every per-asset sibling .sha256 the cli_* jobs uploaded.
          # Skip the manifest itself if it exists from a prior re-run.
          gh release view "$TAG" --json assets \
            --jq '.assets[].name | select(endswith(".sha256")) | select(. != "SHA256SUMS")' \
            > asset-list.txt

          if [ ! -s asset-list.txt ]; then
            echo "::error::no *.sha256 sibling files attached to release $TAG"
            exit 1
          fi

          # Exact-match sanity check: must equal the total number of matrix
          # targets across the cli_* jobs in `needs:` above (NOT the number of
          # jobs — most cli_* are matrix jobs that emit one .sha256 per target).
          # Current breakdown:
          #   cli_mac          x86_64 + aarch64                       = 2
          #   cli_linux        x86_64 + aarch64                       = 2
          #   cli_android      aarch64                                = 1
          #   cli_linux_mini   x86_64                                 = 1
          #   cli_musl         x86_64 + aarch64                       = 2
          #   cli_windows      x86_64 + aarch64                       = 2
          #   cli_mac_mini     x86_64                                 = 1
          #   cli_windows_mini x86_64                                 = 1
          #                                                    total  = 12
          # Drift in either direction is a bug — adding a new matrix target
          # without bumping this constant would silently publish a manifest
          # missing the new platform's hash; dropping a target without
          # decrementing it blocks all releases until corrected (the desired
          # loud failure). Update both together.
          EXPECTED_PLATFORMS=12
          ACTUAL=$(wc -l < asset-list.txt | tr -d ' ')
          if [ "$ACTUAL" -ne "$EXPECTED_PLATFORMS" ]; then
            echo "::error::expected exactly $EXPECTED_PLATFORMS .sha256 siblings (one per matrix target across cli_* jobs), got $ACTUAL"
            cat asset-list.txt
            exit 1
          fi

          while IFS= read -r name; do
            echo "Fetching $name"
            gh release download "$TAG" --pattern "$name" --clobber
          done < asset-list.txt

          # Each sibling file already contains "<hash>  <filename>". Use
          # `awk 1` to concatenate so a sibling missing its trailing newline
          # cannot glue two records onto the same line and silently break
          # `sha256sum -c SHA256SUMS` on the verifier side. Sorted input for
          # deterministic ordering.
          ls *.sha256 | sort | xargs awk 1 > ../SHA256SUMS

          cd ..
          echo "::group::SHA256SUMS"
          cat SHA256SUMS
          echo "::endgroup::"

      - name: Sign SHA256SUMS with cosign (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --yes \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem \
            SHA256SUMS

      - name: Verify signature locally before upload
        run: |
          cosign verify-blob \
            --certificate SHA256SUMS.pem \
            --signature SHA256SUMS.sig \
            --certificate-identity-regexp "^https://github\\.com/${GITHUB_REPOSITORY}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            SHA256SUMS

      - name: Upload signed manifest to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$RELEASE_TAG"
          gh release upload "$TAG" \
            SHA256SUMS \
            SHA256SUMS.sig \
            SHA256SUMS.pem \
            --clobber

  cli_npm:
    name: CLI / npm
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    needs: [cli_mac, cli_linux, cli_musl, cli_windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish CLI binaries to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          cargo xtask publish-npm-binaries \
            --version "$VERSION" \
            --repo "${{ github.repository }}" \
            --tag "${{ env.RELEASE_TAG }}"

  cli_pypi:
    name: CLI / PyPI
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    needs: [cli_mac, cli_linux, cli_musl, cli_windows]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC trusted publishing to PyPI
      contents: read   # actions/checkout (job-level permissions block fully overrides top-level)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Build CLI wheels (no upload)
        run: |
          VERSION="${RELEASE_TAG#v}"
          mkdir -p "${{ runner.temp }}/cli-pypi-dist"
          cargo xtask publish-pypi-binaries \
            --version "$VERSION" \
            --repo "${{ github.repository }}" \
            --tag "${{ env.RELEASE_TAG }}" \
            --build-only \
            --dist-dir "${{ runner.temp }}/cli-pypi-dist"

      - name: Publish CLI wheels to PyPI (OIDC)
        # OIDC trusted publishing — configure at:
        # pypi.org/manage/project/librefang/settings/publishing
        # workflow filename: release.yml, environment: (none)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: ${{ runner.temp }}/cli-pypi-dist
          skip-existing: true

  sync_homebrew:
    name: Sync to Homebrew Tap
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    runs-on: ubuntu-latest
    needs: [cli_mac, cli_linux]
    steps:
      - name: Check out tap repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: librefang/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Fetch release metadata (with retry for asset availability)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail

          # Retry up to 10 times (100s total) to allow asset uploads to complete
          for attempt in $(seq 1 10); do
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
              > release.json

            jq -e '.tag_name and (.assets | type == "array")' release.json >/dev/null

            # Check that all 4 CLI assets exist (macOS + Linux, arm64 + x86_64)
            MAC_ARM_OK=$(jq -r '.assets[] | select(.name == "librefang-aarch64-apple-darwin.tar.gz") | .name' release.json)
            MAC_X86_OK=$(jq -r '.assets[] | select(.name == "librefang-x86_64-apple-darwin.tar.gz") | .name' release.json)
            LNX_ARM_OK=$(jq -r '.assets[] | select(.name == "librefang-aarch64-unknown-linux-gnu.tar.gz") | .name' release.json)
            LNX_X86_OK=$(jq -r '.assets[] | select(.name == "librefang-x86_64-unknown-linux-gnu.tar.gz") | .name' release.json)

            if [ -n "$MAC_ARM_OK" ] && [ -n "$MAC_X86_OK" ] && [ -n "$LNX_ARM_OK" ] && [ -n "$LNX_X86_OK" ]; then
              echo "✓ All 4 CLI assets found on attempt $attempt"
              break
            fi

            if [ "$attempt" -eq 10 ]; then
              echo "::error::CLI assets not found in release after 10 attempts"
              echo "  macOS ARM: ${MAC_ARM_OK:-MISSING}"
              echo "  macOS x86: ${MAC_X86_OK:-MISSING}"
              echo "  Linux ARM: ${LNX_ARM_OK:-MISSING}"
              echo "  Linux x86: ${LNX_X86_OK:-MISSING}"
              exit 1
            fi

            echo "Waiting for CLI assets to be uploaded... ($attempt/10)"
            sleep 10
          done

      - name: Generate formulas (channel-based)
        run: |
          set -euo pipefail

          TAG="${{ env.RELEASE_TAG }}"
          VERSION="${TAG#v}"
          SEMVER="${VERSION}"

          asset_url() {
            jq -r --arg name "$1" '.assets[] | select(.name == $name) | .browser_download_url' release.json
          }

          asset_sha() {
            local sha_url
            sha_url="$(jq -r --arg name "${1}.sha256" '.assets[] | select(.name == $name) | .browser_download_url' release.json)"
            if [ -z "$sha_url" ] || [ "$sha_url" = "null" ]; then
              local asset_url
              asset_url="$(jq -r --arg name "$1" '.assets[] | select(.name == $name) | .browser_download_url' release.json)"
              curl -fsSL "$asset_url" | sha256sum | awk '{print $1}'
            else
              curl -fsSL "$sha_url" | awk '{print $1}'
            fi
          }

          asset_size() {
            jq -r --arg name "$1" '.assets[] | select(.name == $name) | .size' release.json
          }

          # macOS assets
          ARM64_DARWIN_NAME="librefang-aarch64-apple-darwin.tar.gz"
          X86_DARWIN_NAME="librefang-x86_64-apple-darwin.tar.gz"
          # Linux assets
          ARM64_LINUX_NAME="librefang-aarch64-unknown-linux-gnu.tar.gz"
          X86_LINUX_NAME="librefang-x86_64-unknown-linux-gnu.tar.gz"

          ARM64_DARWIN_URL="$(asset_url "$ARM64_DARWIN_NAME")"
          X86_DARWIN_URL="$(asset_url "$X86_DARWIN_NAME")"
          ARM64_LINUX_URL="$(asset_url "$ARM64_LINUX_NAME")"
          X86_LINUX_URL="$(asset_url "$X86_LINUX_NAME")"

          ARM64_DARWIN_SHA="$(asset_sha "$ARM64_DARWIN_NAME")"
          X86_DARWIN_SHA="$(asset_sha "$X86_DARWIN_NAME")"
          ARM64_LINUX_SHA="$(asset_sha "$ARM64_LINUX_NAME")"
          X86_LINUX_SHA="$(asset_sha "$X86_LINUX_NAME")"

          ARM64_DARWIN_SIZE="$(asset_size "$ARM64_DARWIN_NAME")"
          X86_DARWIN_SIZE="$(asset_size "$X86_DARWIN_NAME")"
          ARM64_LINUX_SIZE="$(asset_size "$ARM64_LINUX_NAME")"
          X86_LINUX_SIZE="$(asset_size "$X86_LINUX_NAME")"

          for required in \
            ARM64_DARWIN_URL X86_DARWIN_URL ARM64_LINUX_URL X86_LINUX_URL \
            ARM64_DARWIN_SHA X86_DARWIN_SHA ARM64_LINUX_SHA X86_LINUX_SHA \
            ARM64_DARWIN_SIZE X86_DARWIN_SIZE ARM64_LINUX_SIZE X86_LINUX_SIZE
          do
            if [ -z "${!required}" ] || [ "${!required}" = "null" ]; then
              echo "Missing release metadata: $required" >&2
              exit 1
            fi
          done

          for size_var in ARM64_DARWIN_SIZE X86_DARWIN_SIZE ARM64_LINUX_SIZE X86_LINUX_SIZE
          do
            if [ "${!size_var}" -le 0 ]; then
              echo "Release asset is empty: $size_var" >&2
              exit 1
            fi
          done

          # Channel strategy (like Apple software updates):
          #   -rc tag    → update rc channel only
          #   -beta tag  → update beta + rc channels
          #   stable tag → update stable + beta + rc channels
          if echo "$VERSION" | grep -qE '\-rc'; then
            CHANNELS=(rc)
          elif echo "$VERSION" | grep -qE '\-beta'; then
            CHANNELS=(beta rc)
          else
            CHANNELS=(stable beta rc)
          fi

          echo "Release $VERSION → updating formula channels: ${CHANNELS[*]}"

          ALL_CHANNELS=(stable beta rc)

          generate_formula() {
            local channel="$1"
            local formula_name="librefang"
            local class_name="Librefang"
            local desc_suffix=""

            if [ "$channel" != "stable" ]; then
              formula_name="librefang-${channel}"
              # librefang-beta → LibrefangBeta, librefang-rc → LibrefangRc
              local suffix
              suffix="$(echo "${channel}" | sed 's/.*/\u&/')"
              class_name="Librefang${suffix}"
              desc_suffix=" (${channel} channel)"
            fi

            # Build conflicts_with lines
            local conflicts=""
            for other in "${ALL_CHANNELS[@]}"; do
              [ "$other" = "$channel" ] && continue
              local other_name="librefang"
              [ "$other" != "stable" ] && other_name="librefang-${other}"
              conflicts="${conflicts}
            conflicts_with \"${other_name}\", because: \"both install a \\\`librefang\\\` binary\""
            done

            # Livecheck only for stable channel
            local livecheck=""
            if [ "$channel" = "stable" ]; then
              livecheck='

            livecheck do
              url "https://github.com/librefang/librefang/releases/latest"
              strategy :header_match
            end'
            fi

            mkdir -p tap/Formula
            cat > "tap/Formula/${formula_name}.rb" <<FORMULA
          class ${class_name} < Formula
            desc "Community-Maintained Agent Operating System written in Rust${desc_suffix}"
            homepage "https://librefang.ai"
            license "MIT"
            version "$SEMVER"
          ${conflicts}${livecheck}

            on_macos do
              if Hardware::CPU.arm?
                url "$ARM64_DARWIN_URL"
                sha256 "$ARM64_DARWIN_SHA"
              else
                url "$X86_DARWIN_URL"
                sha256 "$X86_DARWIN_SHA"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "$ARM64_LINUX_URL"
                sha256 "$ARM64_LINUX_SHA"
              else
                url "$X86_LINUX_URL"
                sha256 "$X86_LINUX_SHA"
              end
            end

            def install
              bin.install "librefang"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/librefang --version")
            end
          end
          FORMULA

            echo "=== Formula: ${formula_name} ==="
            cat "tap/Formula/${formula_name}.rb"
          }

          for channel in "${CHANNELS[@]}"; do
            generate_formula "$channel"
          done

          # --- Versioned formula (e.g. librefang@2026.3.2114) ---
          # Always generated for every release, regardless of channel
          CLASS_SUFFIX=$(echo "$SEMVER" | tr -d '.')
          CLASS_NAME="LibrefangAT${CLASS_SUFFIX}"

          cat > "tap/Formula/librefang@${SEMVER}.rb" <<FORMULA
          class ${CLASS_NAME} < Formula
            desc "Community-Maintained Agent Operating System written in Rust"
            homepage "https://librefang.ai"
            license "MIT"
            version "$SEMVER"

            on_macos do
              if Hardware::CPU.arm?
                url "$ARM64_DARWIN_URL"
                sha256 "$ARM64_DARWIN_SHA"
              else
                url "$X86_DARWIN_URL"
                sha256 "$X86_DARWIN_SHA"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "$ARM64_LINUX_URL"
                sha256 "$ARM64_LINUX_SHA"
              else
                url "$X86_LINUX_URL"
                sha256 "$X86_LINUX_SHA"
              end
            end

            keg_only :versioned_formula

            def install
              bin.install "librefang"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/librefang --version")
            end
          end
          FORMULA

          echo ""
          echo "=== Versioned formula: librefang@${SEMVER}.rb ==="
          cat "tap/Formula/librefang@${SEMVER}.rb"

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore: update formula channels to ${{ env.RELEASE_TAG }}" || echo "No changes"
          git push

  # ═════════════════════════════════════════════════════════════════════════
  # Desktop (Tauri) — from release-desktop.yml
  # ═════════════════════════════════════════════════════════════════════════

  desktop:
    name: Desktop / ${{ matrix.platform.name }}
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    needs: [create_release]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x86_64
            os: ubuntu-22.04
            args: "--target x86_64-unknown-linux-gnu"
            rust_target: x86_64-unknown-linux-gnu

          - name: macOS x86_64
            os: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin

          - name: macOS ARM64
            os: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin

          - name: Windows x86_64
            os: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            rust_target: x86_64-pc-windows-msvc

          - name: Windows ARM64
            os: windows-latest
            args: "--target aarch64-pc-windows-msvc"
            rust_target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        # libdbus-1-dev is required by libdbus-sys, pulled in transitively
        # by the keyring crate's secret-service backend on glibc Linux
        # (librefang-desktop -> librefang-extensions). webkit2gtk has
        # historically pulled libdbus-1-dev as a transitive system dep,
        # but make it explicit so the build doesn't break the day apt
        # changes its package metadata.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: desktop-${{ matrix.platform.rust_target }}-${{ env.RELEASE_TAG }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - name: Build embedded dashboard assets
        working-directory: crates/librefang-api/dashboard
        run: |
          pnpm install --frozen-lockfile --config.strict-dep-builds=false
          pnpm run build

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          if [ -z "$MAC_CERT_BASE64" ]; then
            echo "No certificate configured, skipping..."
            exit 0
          fi
          echo "$MAC_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import $RUNNER_TEMP/certificate.p12 -P "$MAC_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          # Prepend (NOT replace) the search list. Same reason as the
          # mobile_ios job below — replace works on a clean GitHub-hosted
          # runner but hides existing entries on a future self-hosted one.
          PRIOR=$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          security list-keychain -d user -s "$KEYCHAIN_PATH" $PRIOR
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "Using signing identity: $IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          rm -f $RUNNER_TEMP/certificate.p12

      - name: Check notarization readiness
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY != ''
        env:
          TEAM_ID: ${{ secrets.MAC_NOTARIZE_TEAM_ID }}
        run: |
          if [ -z "$TEAM_ID" ] || [ ${#TEAM_ID} -lt 3 ]; then
            echo "::warning::MAC_NOTARIZE_TEAM_ID is missing or invalid, falling back to unsigned build"
            echo "APPLE_SIGNING_IDENTITY=" >> $GITHUB_ENV
          fi

      - name: Verify Tauri version (CalVer, Major ≤ 255 for WiX MSI)
        shell: bash
        run: |
          cd crates/librefang-desktop
          TAURI_VER=$(grep '"version"' tauri.conf.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          echo "Tauri version: $TAURI_VER"
          MAJOR=$(echo "$TAURI_VER" | cut -d. -f1)
          MINOR=$(echo "$TAURI_VER" | cut -d. -f2)
          PATCH=$(echo "$TAURI_VER" | cut -d. -f3)
          if [ "$MAJOR" -gt 255 ] || [ "$MINOR" -gt 255 ] || [ "$PATCH" -gt 65535 ]; then
            echo "::error::Tauri version $TAURI_VER exceeds MSI limits (Major/Minor ≤ 255, Patch ≤ 65535)"
            exit 1
          fi
          echo "✓ Version $TAURI_VER is MSI-compatible"

      - name: Delete existing assets for this target (allows re-release)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$RELEASE_TAG"
          # Fetch asset list with retry (GitHub API can be transiently unavailable)
          ASSETS=""
          for attempt in $(seq 1 5); do
            if ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null); then
              break
            fi
            echo "Failed to fetch release assets (attempt $attempt/5), retrying in 10s..."
            sleep 10
          done
          # Delete any matching this target
          echo "$ASSETS" | while read -r name; do
            [ -z "$name" ] && continue
            case "$name" in
              *${{ matrix.platform.rust_target }}*|*latest.json)
                echo "Deleting existing asset: $name"
                gh release delete-asset "$TAG" "$name" --yes 2>/dev/null || true
                ;;
            esac
          done

      - name: Build and bundle Tauri desktop app
        if: runner.os != 'macOS' || env.APPLE_SIGNING_IDENTITY == ''
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "${{ env.RELEASE_TAG }}"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          projectPath: crates/librefang-desktop
          args: ${{ matrix.platform.args }}

      - name: Build and bundle Tauri desktop app (signed macOS)
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY != ''
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.MAC_NOTARIZE_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.MAC_NOTARIZE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.MAC_NOTARIZE_TEAM_ID }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "${{ env.RELEASE_TAG }}"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          projectPath: crates/librefang-desktop
          args: ${{ matrix.platform.args }}

  # ── Mobile builds ──────────────────────────────────────────────────────
  #
  # Treated as best-effort: a flaky cert refresh on Apple's side or an
  # Android signing snag must NOT block the desktop matrix above. Each
  # mobile job uses `continue-on-error: true` and `if: always()` for the
  # release-attach step, so a failed build leaves the desktop release
  # intact while still surfacing the failure in the workflow summary.
  #
  # Secrets required: see .github/SECRETS.md. When secrets are missing
  # (typical on a fork or for the very first run on a fresh repo), each
  # job degrades to an unsigned debug build that just verifies the
  # toolchain still works, rather than failing the whole pipeline.

  mobile_android:
    name: Mobile / Android (aab + apk)
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    needs: [create_release]
    continue-on-error: true
    runs-on: ubuntu-latest
    env:
      # ANDROID_HOME / ANDROID_SDK_ROOT are exported by setup-android; the
      # Tauri Android driver insists on NDK_HOME being set explicitly even
      # though the SDK manager already installs the NDK below.
      NDK_VERSION: "27.0.12077973"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: "platforms;android-34 build-tools;34.0.0 ndk;${{ env.NDK_VERSION }}"

      - name: Export NDK_HOME
        run: |
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: mobile-android-${{ env.RELEASE_TAG }}
          restore-keys: |
            mobile-android-

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # See mobile-smoke.yml for why this cache is paired with the install.
      - name: Cache tauri-cli binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: tauri-cli-${{ runner.os }}-v2

      - name: Install Tauri CLI
        run: |
          if ! command -v cargo-tauri >/dev/null; then
            cargo install tauri-cli@^2 --locked
          fi

      - name: Build embedded dashboard assets
        working-directory: crates/librefang-api/dashboard
        run: |
          pnpm install --frozen-lockfile --config.strict-dep-builds=false
          pnpm run build

      - name: Initialise Android project
        working-directory: crates/librefang-desktop
        # See mobile-smoke.yml — the repo's `gen/android/README.md`
        # placeholder confuses tauri-cli into thinking the project is
        # already scaffolded. Wipe it so init starts clean.
        run: |
          rm -rf gen/android
          cargo tauri android init

      # See docs/operations/mobile-release for the full version-mapping
      # rationale. Both stores require monotonically increasing build
      # numbers; we derive YYYYMMDDNN from the current UTC date and the
      # workflow run number so consecutive same-day re-runs do not
      # regress.
      - name: Compute mobile build numbers
        id: ver
        run: |
          set -euo pipefail
          # Display version: workspace.package.version from root Cargo.toml,
          # stripped of any pre-release suffix (`-beta7` etc.). Stores reject
          # non-numeric segments in the user-visible version string.
          DISPLAY_FULL=$(awk '/^\[workspace.package\]/{f=1; next} f && /^version *=/ {gsub(/[" ]/,"",$3); print $3; exit}' Cargo.toml)
          if [ -z "$DISPLAY_FULL" ]; then
            echo "::error::Could not parse [workspace.package].version from Cargo.toml"
            exit 1
          fi
          DISPLAY="${DISPLAY_FULL%%-*}"
          # Build number scheme YYYYMMDDNN (#3348). NN is run_number mod 100;
          # >100 release attempts on a single calendar day will collide and
          # the store will reject the build with a clear error — acceptable
          # given the practical release cadence. The binding ceiling is
          # Play's 2_100_000_000 versionCode cap, not int32 — YYYYMMDDNN
          # stays under that cap until 2100-01-01.
          DATE=$(date -u +%Y%m%d)
          NN=$(printf "%02d" $(( ${{ github.run_number }} % 100 )))
          BUILD="${DATE}${NN}"
          {
            echo "display=$DISPLAY"
            echo "display_full=$DISPLAY_FULL"
            echo "build=$BUILD"
          } >> "$GITHUB_OUTPUT"
          echo "Display: $DISPLAY (from $DISPLAY_FULL)  Build: $BUILD"

      - name: Inject Android version
        working-directory: crates/librefang-desktop
        env:
          DISPLAY: ${{ steps.ver.outputs.display }}
          BUILD: ${{ steps.ver.outputs.build }}
        run: |
          set -euo pipefail
          # Stamp the user-visible version (versionName) into tauri.conf.json.
          jq --arg ver "$DISPLAY" '.version = $ver' tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp tauri.conf.json
          # Override the auto-derived versionCode with the YYYYMMDDNN scheme.
          # tauri-cli respects bundle.android.versionCode when present.
          jq --argjson code "$BUILD" \
            '.bundle = (.bundle // {}) | .bundle.android = (.bundle.android // {}) | .bundle.android.versionCode = $code' \
            tauri.android.conf.json > tauri.android.conf.json.tmp
          mv tauri.android.conf.json.tmp tauri.android.conf.json
          echo "Android: versionName=$DISPLAY versionCode=$BUILD"

      - name: Decode Android signing keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_B64" ]; then
            echo "::warning::ANDROID_KEYSTORE_B64 not set — skipping Android build (no unsigned debug fallback; release artifacts must be signed)"
            echo "signed=false" >> "$GITHUB_OUTPUT"
          else
            echo "$ANDROID_KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/release.jks"
            echo "signed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed release (.aab + .apk)
        if: steps.keystore.outputs.signed == 'true'
        working-directory: crates/librefang-desktop
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        # `-- --no-default-features` is a cargo flag passed through
        # tauri-cli. Every channel adapter runs as a Python sidecar
        # now; the `mobile-no-email` flavor that worked around the
        # in-process channel-email's rustls-platform-verifier Android
        # incompatibility is gone with the feature itself.
        run: |
          cargo tauri android build \
            --target aarch64 \
            --apk --aab \
            -- --no-default-features

      - name: Locate artifacts
        id: art
        run: |
          set -euo pipefail
          AAB=$(find . -name "*.aab" -path "*/release/*" | head -1 || true)
          APK=$(find . -name "*.apk" -path "*/release/*" | head -1 || true)
          echo "aab=$AAB" >> "$GITHUB_OUTPUT"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        if: always() && (steps.art.outputs.aab != '' || steps.art.outputs.apk != '')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AAB_PATH: ${{ steps.art.outputs.aab }}
          APK_PATH: ${{ steps.art.outputs.apk }}
        run: |
          set -euo pipefail
          TAG="$RELEASE_TAG"
          for f in "$AAB_PATH" "$APK_PATH"; do
            [ -z "$f" ] && continue
            base=$(basename "$f")
            echo "Uploading $base"
            gh release upload "$TAG" "$f" --clobber || true
          done

      # Unattended Play Internal Testing upload (#3348). Skipped silently
      # if GOOGLE_PLAY_SERVICE_ACCOUNT_JSON is not configured (forks,
      # first-run repos), so the rest of the release pipeline is
      # unaffected. The aab from the signed build is the only acceptable
      # input — apks and unsigned debug builds are not promotable.
      - name: Check Play upload secret
        id: play_gate
        if: steps.keystore.outputs.signed == 'true' && steps.art.outputs.aab != ''
        env:
          PLAY_SA_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$PLAY_SA_JSON" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON not set — skipping Play Internal Testing upload"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Play Internal Testing
        if: steps.play_gate.outputs.ready == 'true'
        # Soft-fail: a Play API hiccup (account verification still pending,
        # transient 5xx, track not yet bootstrapped manually) downgrades to
        # a job-summary warning instead of failing the whole release.
        # The .aab still landed on the GitHub Release in the prior step.
        continue-on-error: true
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ai.librefang.app
          releaseFiles: ${{ steps.art.outputs.aab }}
          track: internal
          status: completed
          # Promote manually from the Play Console after pre-launch reports
          # come back clean — see docs/operations/mobile-release.

      - name: Wipe keystore from runner
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"

  mobile_ios:
    name: Mobile / iOS (ipa)
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    needs: [create_release]
    continue-on-error: true
    # macos-26 ships Xcode 26 (default 26.2). Use the default Xcode
    # rather than pinning a specific SDK — for a Tauri release build the
    # SDK delta inside the 26.x line is irrelevant and skipping
    # setup-xcode saves 1–2 min per run.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Show selected Xcode
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun simctl list runtimes available | head -20

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: mobile-ios-${{ env.RELEASE_TAG }}
          restore-keys: |
            mobile-ios-

      - name: Cache tauri-cli binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: tauri-cli-${{ runner.os }}-v2

      - name: Install Tauri CLI
        run: |
          if ! command -v cargo-tauri >/dev/null; then
            cargo install tauri-cli@^2 --locked
          fi

      - name: Build embedded dashboard assets
        working-directory: crates/librefang-api/dashboard
        run: |
          pnpm install --frozen-lockfile --config.strict-dep-builds=false
          pnpm run build

      - name: Initialise iOS project
        working-directory: crates/librefang-desktop
        # cargo-mobile2 reads APPLE_DEVELOPMENT_TEAM at init time and bakes
        # it into the generated xcodeproj's DEVELOPMENT_TEAM build setting.
        # Without it, xcodebuild later fails with "Signing for ... requires a
        # development team". Reuses the same secret as the macOS notarize
        # step — same Apple Developer account.
        #
        # cargo-mobile2 does NOT honour APPLE_PROFILE_NAME and leaves
        # CODE_SIGN_STYLE = Automatic in the generated xcodeproj. The
        # subsequent "Force manual code signing on generated xcodeproj"
        # step patches that — see its comment for the full rationale.
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: cargo tauri ios init

      - name: Configure manual code signing via xcodebuild shim
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROFILE_NAME: ${{ secrets.APPLE_PROFILE_NAME }}
        # cargo-mobile2's `cargo tauri ios init` writes DEVELOPMENT_TEAM
        # but leaves CODE_SIGN_STYLE = Automatic in the generated
        # xcodeproj, AND cargo-tauri auto-generates an exportOptions.plist
        # with `signingStyle=automatic` for the `xcodebuild -exportArchive`
        # step. Both phases then fail on a GitHub-hosted macOS runner:
        #
        #   1. Build phase:
        #      error: No Accounts: Add a new account in Accounts settings.
        #      error: No profiles for '<bundle_id>' were found.
        #
        #   2. Export phase (after archive succeeds):
        #      error: exportArchive No Accounts
        #      error: exportArchive No profiles for '<bundle_id>' were found
        #      ** EXPORT FAILED ** xcodebuild exited with code 70
        #
        # Both fall through to "fetch a Development profile via a signed-in
        # Apple ID", and CI runners don't have one — even though the
        # distribution .mobileprovision is on disk.
        #
        # Fix both with one PATH shim that wraps xcodebuild:
        #   • For `xcodebuild build|archive|...`: prepend `-xcconfig <override>`
        #     so manual signing build settings override the pbxproj's Automatic.
        #   • For `xcodebuild -exportArchive ...`: strip cargo-tauri's auto-
        #     generated `-exportOptionsPlist <auto>` pair and substitute our
        #     own plist with `signingStyle=manual` + `provisioningProfiles`
        #     mapping the bundle id to the imported distribution profile.
        #
        # Both override files (xcconfig + exportOptions.plist) live in
        # $RUNNER_TEMP, are declarative, and don't touch the generated
        # xcodeproj — so we stay decoupled from cargo-mobile2's templating.
        # Bundle id is read from tauri.ios.conf.json so a future rename in
        # that file doesn't silently regress the export step.
        #
        # Skipped (with a warning) when the signing secrets are absent so
        # forks without an Apple Developer account still get a clean run;
        # the downstream "Build signed .ipa" step is gated on signed=true.
        #
        # Refs #4818, #4385.
        run: |
          set -euo pipefail
          if [ -z "${APPLE_TEAM_ID:-}" ] || [ -z "${APPLE_PROFILE_NAME:-}" ]; then
            echo "::warning::Apple signing secrets missing — leaving Automatic signing in place (the .ipa build will be skipped)"
            exit 0
          fi
          REAL_XCODEBUILD=$(command -v xcodebuild || true)
          if [ -z "$REAL_XCODEBUILD" ] || [ ! -x "$REAL_XCODEBUILD" ]; then
            echo "::error::xcodebuild not found on PATH"
            exit 1
          fi
          # Resolve any symlink so the shim never recurses into itself if
          # PATH ordering shifts later in the job.
          REAL_XCODEBUILD=$(readlink -f "$REAL_XCODEBUILD" 2>/dev/null || echo "$REAL_XCODEBUILD")
          BUNDLE_ID=$(jq -r .identifier crates/librefang-desktop/tauri.ios.conf.json)
          if [ -z "$BUNDLE_ID" ] || [ "$BUNDLE_ID" = "null" ]; then
            echo "::error::Could not read .identifier from tauri.ios.conf.json"
            exit 1
          fi
          XCCONFIG="$RUNNER_TEMP/librefang-signing.xcconfig"
          # Spaces in display names are common ("LibreFang Distribution")
          # and xcconfig parses unquoted-to-end-of-line for string values,
          # so no quoting required here.
          cat > "$XCCONFIG" <<EOF
          CODE_SIGN_STYLE = Manual
          DEVELOPMENT_TEAM = $APPLE_TEAM_ID
          PROVISIONING_PROFILE_SPECIFIER = $APPLE_PROFILE_NAME
          CODE_SIGN_IDENTITY = iPhone Distribution
          EOF
          # `method=app-store` keeps the .ipa shape compatible with the
          # downstream TestFlight upload (App Store distribution); same
          # value Apple's altool/notarytool flow expects.
          EXPORT_OPTS="$RUNNER_TEMP/librefang-export-options.plist"
          cat > "$EXPORT_OPTS" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>$APPLE_TEAM_ID</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$BUNDLE_ID</key>
                  <string>$APPLE_PROFILE_NAME</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          # Validate both override files before subsequent steps depend
          # on them. xcconfig has no validator built into xcodebuild
          # (loads silently), so we only check the plist; xcconfig
          # syntax errors would surface as build failures with clear
          # "unrecognized" messages.
          plutil -lint "$EXPORT_OPTS"
          SHIM_DIR="$RUNNER_TEMP/xcodebuild-shim"
          mkdir -p "$SHIM_DIR"
          # Quoted heredoc (`'EOF'`) so the shim body is written literally:
          # only $REAL_XCODEBUILD / $XCCONFIG / $EXPORT_OPTS get interpolated
          # via explicit variable substitution below the heredoc, so $@
          # / $arg / etc. are evaluated at shim run-time, not now.
          cat > "$SHIM_DIR/xcodebuild" <<'SHIM_EOF'
          #!/bin/bash
          # Auto-generated by release.yml's "Configure manual code signing"
          # step. Wraps the real xcodebuild to inject manual-signing
          # overrides into cargo-tauri's invocations.
          set -euo pipefail
          REAL_XCODEBUILD='__REAL_XCODEBUILD__'
          XCCONFIG='__XCCONFIG__'
          EXPORT_OPTS='__EXPORT_OPTS__'
          IS_EXPORT=0
          for a in "$@"; do
            if [ "$a" = "-exportArchive" ]; then IS_EXPORT=1; break; fi
          done
          if [ $IS_EXPORT -eq 0 ]; then
            exec "$REAL_XCODEBUILD" -xcconfig "$XCCONFIG" "$@"
          fi
          # Export: drop existing -exportOptionsPlist <path> pair, splice
          # in ours. Other args (archive path, export path, scheme, etc.)
          # pass through verbatim.
          NEW=()
          SKIP=0
          for a in "$@"; do
            if [ $SKIP -eq 1 ]; then SKIP=0; continue; fi
            if [ "$a" = "-exportOptionsPlist" ]; then SKIP=1; continue; fi
            NEW+=("$a")
          done
          exec "$REAL_XCODEBUILD" -exportOptionsPlist "$EXPORT_OPTS" "${NEW[@]}"
          SHIM_EOF
          # Substitute the literal placeholders with actual paths. Done
          # post-hoc to keep the heredoc body unambiguous (no $-mixing
          # with the shim's own runtime expansions).
          sed -i '' \
            -e "s|__REAL_XCODEBUILD__|$REAL_XCODEBUILD|" \
            -e "s|__XCCONFIG__|$XCCONFIG|" \
            -e "s|__EXPORT_OPTS__|$EXPORT_OPTS|" \
            "$SHIM_DIR/xcodebuild"
          chmod +x "$SHIM_DIR/xcodebuild"
          # Make the shim visible to subsequent steps via GITHUB_PATH.
          echo "$SHIM_DIR" >> "$GITHUB_PATH"
          # Sanity-check the shim resolves before the build step relies
          # on it. Use the same PATH ordering that subsequent steps will
          # see (GITHUB_PATH prepends).
          PATH="$SHIM_DIR:$PATH" command -v xcodebuild
          PATH="$SHIM_DIR:$PATH" xcodebuild -version | head -2
          echo "=== shim script ==="
          cat "$SHIM_DIR/xcodebuild"
          echo "=== xcconfig ==="
          cat "$XCCONFIG"
          echo "=== exportOptions.plist ==="
          cat "$EXPORT_OPTS"

      # Mirror of the Android version-derivation logic. Both jobs run in
      # parallel for the same tag, so each computes its own copy. Same
      # YYYYMMDDNN scheme — see docs/operations/mobile-release.
      - name: Compute mobile build numbers
        id: ver
        run: |
          set -euo pipefail
          DISPLAY_FULL=$(awk '/^\[workspace.package\]/{f=1; next} f && /^version *=/ {gsub(/[" ]/,"",$3); print $3; exit}' Cargo.toml)
          if [ -z "$DISPLAY_FULL" ]; then
            echo "::error::Could not parse [workspace.package].version from Cargo.toml"
            exit 1
          fi
          DISPLAY="${DISPLAY_FULL%%-*}"
          DATE=$(date -u +%Y%m%d)
          NN=$(printf "%02d" $(( ${{ github.run_number }} % 100 )))
          BUILD="${DATE}${NN}"
          {
            echo "display=$DISPLAY"
            echo "display_full=$DISPLAY_FULL"
            echo "build=$BUILD"
          } >> "$GITHUB_OUTPUT"
          echo "Display: $DISPLAY (from $DISPLAY_FULL)  Build: $BUILD"

      - name: Inject iOS version
        working-directory: crates/librefang-desktop
        env:
          DISPLAY: ${{ steps.ver.outputs.display }}
          BUILD: ${{ steps.ver.outputs.build }}
        run: |
          set -euo pipefail
          # Tauri reads the user-visible string (CFBundleShortVersionString)
          # from the root tauri.conf.json `version` field.
          jq --arg ver "$DISPLAY" '.version = $ver' tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp tauri.conf.json
          # Override CFBundleVersion via the iOS Info.plist that
          # `cargo tauri ios init` just generated. PlistBuddy is the
          # supported macOS toolchain path; xcrun plutil would also work
          # but is more verbose for in-place edits. Exclude Tests /
          # UITests targets — only the main app's plist drives what
          # ships to TestFlight.
          PLIST=$(find gen/apple -name 'Info.plist' -path '*_iOS*' \
            ! -path '*Tests*' ! -path '*UITests*' | head -1)
          if [ -z "$PLIST" ] || [ ! -f "$PLIST" ]; then
            echo "::error::Could not locate generated iOS Info.plist under gen/apple/*_iOS"
            find gen/apple -name 'Info.plist' || true
            exit 1
          fi
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $DISPLAY" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $DISPLAY" "$PLIST"
          # Encryption export compliance — declare standard encryption
          # only (TLS via system frameworks). Pre-set the flag so first
          # App Review submission does not block on the form.
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST"
          echo "iOS plist=$PLIST CFBundleShortVersionString=$DISPLAY CFBundleVersion=$BUILD"

      - name: Gate iOS signing on secret availability
        id: keychain
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_PROVISIONING_PROFILE_B64: ${{ secrets.APPLE_PROVISIONING_PROFILE_B64 }}
        # Mirrors the TestFlight gate pattern below. Forks without an
        # Apple Developer account get a clean run; the cert + profile +
        # build steps all `if:` on `signed == 'true'`.
        run: |
          if [ -n "$APPLE_CERT_P12" ] && [ -n "$APPLE_PROVISIONING_PROFILE_B64" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Apple signing secrets missing — skipping iOS build (no unsigned simulator fallback; release artifacts must be signed)"
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import distribution certificate
        if: steps.keychain.outputs.signed == 'true'
        # Action creates a temporary `signing_temp` keychain, imports the
        # .p12, sets the partition list for codesign access, and cleans
        # everything up via its `post:` hook at job end. Replaces ~25
        # lines of `security create-keychain / import / set-key-partition-list`
        # shell that we used to maintain by hand (refs #4385).
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          p12-file-base64: ${{ secrets.APPLE_CERT_P12 }}
          p12-password: ${{ secrets.APPLE_CERT_PASSWORD }}

      - name: Install distribution provisioning profile
        if: steps.keychain.outputs.signed == 'true'
        env:
          APPLE_PROVISIONING_PROFILE_B64: ${{ secrets.APPLE_PROVISIONING_PROFILE_B64 }}
        # No first-party action covers base64-blob → MobileDevice/Provisioning
        # Profiles/ install. apple-actions/download-provisioning-profiles
        # would, but it pulls from App Store Connect which is a different
        # secret shape (API key) than the .mobileprovision blob we already
        # store. Keep the 3-line decode.
        run: |
          set -euo pipefail
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$APPLE_PROVISIONING_PROFILE_B64" | base64 --decode \
            > "$PROFILES_DIR/librefang.mobileprovision"

      - name: Build signed .ipa
        if: steps.keychain.outputs.signed == 'true'
        working-directory: crates/librefang-desktop
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROFILE_NAME: ${{ secrets.APPLE_PROFILE_NAME }}
        # `-- --no-default-features` is a cargo flag passed through
        # tauri-cli. See the android job above for the broader context
        # — `mobile-no-email` is gone now that every channel runs as a
        # Python sidecar.
        run: |
          cargo tauri ios build --target aarch64 -- --no-default-features

      - name: Locate .ipa
        id: art
        run: |
          set -euo pipefail
          IPA=$(find . -name "*.ipa" | head -1 || true)
          echo "ipa=$IPA" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        if: always() && steps.art.outputs.ipa != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IPA_PATH: ${{ steps.art.outputs.ipa }}
        run: |
          set -euo pipefail
          TAG="$RELEASE_TAG"
          gh release upload "$TAG" "$IPA_PATH" --clobber || true

      # Unattended TestFlight upload (#3348). Uses an App Store Connect
      # API key — preferred over Apple ID + app-specific password since
      # the API key is revocable per-key and does not require a human
      # 2FA prompt. Skipped silently if any of the three secrets are
      # missing so forks and first-run repos are unaffected.
      - name: Check TestFlight upload secrets
        id: tf_gate
        if: steps.keychain.outputs.signed == 'true' && steps.art.outputs.ipa != ''
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          if [ -n "$APPLE_API_KEY_ID" ] \
             && [ -n "$APPLE_API_KEY_ISSUER_ID" ] \
             && [ -n "$APPLE_API_KEY_P8" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::APPLE_API_KEY_* secrets not all set — skipping TestFlight upload"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to TestFlight
        if: steps.tf_gate.outputs.ready == 'true'
        # Soft-fail: an App Store Connect hiccup (slow processing, transient
        # 5xx, app record not yet created) downgrades to a job-summary
        # warning instead of failing the whole release. The .ipa still
        # landed on the GitHub Release in the prior step.
        continue-on-error: true
        uses: Apple-Actions/upload-testflight-build@1ad58030672057aa084b4e96beb6f7a8c627f9e6 # v5.2.1
        with:
          app-path: ${{ steps.art.outputs.ipa }}
          issuer-id: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          # The action wants the PKCS8-formatted .p8 contents verbatim
          # (BEGIN/END lines preserved). Store the raw .p8 text in the
          # secret — GitHub Actions handles multi-line values fine.
          api-private-key: ${{ secrets.APPLE_API_KEY_P8 }}
          uses-non-exempt-encryption: "false"

  sync_homebrew_cask:
    name: Sync Homebrew Cask
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    runs-on: ubuntu-latest
    needs: [desktop]
    steps:
      - name: Check out tap repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: librefang/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Fetch release metadata (with retry for DMG availability)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 10); do
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
              > release.json

            # Match DMG assets by suffix (Tauri version differs from tag version)
            ARM_DMG=$(jq -r '[.assets[].name | select(endswith("_aarch64.dmg"))][0] // empty' release.json)
            X86_DMG=$(jq -r '[.assets[].name | select(endswith("_x64.dmg"))][0] // empty' release.json)

            if [ -n "$ARM_DMG" ] && [ -n "$X86_DMG" ]; then
              echo "✓ Both DMG assets found on attempt $attempt"
              echo "  ARM: $ARM_DMG"
              echo "  x86: $X86_DMG"
              break
            fi

            if [ "$attempt" -eq 10 ]; then
              echo "::error::DMG assets not found in release after 10 attempts"
              echo "  ARM DMG: ${ARM_DMG:-MISSING}"
              echo "  x86 DMG: ${X86_DMG:-MISSING}"
              exit 1
            fi

            echo "Waiting for DMG assets... ($attempt/10)"
            sleep 10
          done

      - name: Generate Casks (channel-based)
        run: |
          set -euo pipefail

          TAG="${{ env.RELEASE_TAG }}"
          VERSION="${TAG#v}"

          # Resolve actual DMG names (Tauri version differs from tag version)
          ARM_DMG=$(jq -r '[.assets[].name | select(endswith("_aarch64.dmg"))][0] // empty' release.json)
          X86_DMG=$(jq -r '[.assets[].name | select(endswith("_x64.dmg"))][0] // empty' release.json)
          # Extract Tauri version from DMG filename for cask version field
          TAURI_VERSION=$(echo "$ARM_DMG" | sed 's/^LibreFang_//; s/_aarch64\.dmg$//')

          if [ -z "$ARM_DMG" ] || [ -z "$X86_DMG" ]; then
            echo "::error::DMG assets not found in release.json"
            exit 1
          fi
          echo "DMG version (Tauri): $TAURI_VERSION"

          asset_sha() {
            local sha_url
            sha_url="$(jq -r --arg name "${1}.sha256" '.assets[] | select(.name == $name) | .browser_download_url' release.json)"
            if [ -z "$sha_url" ] || [ "$sha_url" = "null" ]; then
              local asset_url
              asset_url="$(jq -r --arg name "$1" '.assets[] | select(.name == $name) | .browser_download_url' release.json)"
              curl -fsSL "$asset_url" | sha256sum | awk '{print $1}'
            else
              curl -fsSL "$sha_url" | awk '{print $1}'
            fi
          }

          ARM_SHA="$(asset_sha "$ARM_DMG")"
          X86_SHA="$(asset_sha "$X86_DMG")"

          for required in ARM_SHA X86_SHA; do
            if [ -z "${!required}" ] || [ "${!required}" = "null" ]; then
              echo "Missing SHA256 for $required" >&2
              exit 1
            fi
          done

          # Channel strategy (like Apple software updates):
          #   -rc tag    → update rc channel only
          #   -beta tag  → update beta + rc channels
          #   stable tag → update stable + beta + rc channels
          if echo "$VERSION" | grep -qE '\-rc'; then
            CHANNELS=(rc)
          elif echo "$VERSION" | grep -qE '\-beta'; then
            CHANNELS=(beta rc)
          else
            CHANNELS=(stable beta rc)
          fi

          echo "Release $VERSION → updating cask channels: ${CHANNELS[*]}"

          ALL_CHANNELS=(stable beta rc)

          generate_cask() {
            local channel="$1"
            local cask_name="librefang"
            local display_name="LibreFang"
            local desc_suffix=""

            if [ "$channel" != "stable" ]; then
              cask_name="librefang-${channel}"
              display_name="LibreFang (${channel})"
              desc_suffix=" (${channel} channel)"
            fi

            # Build conflicts_with lines
            local conflicts=""
            for other in "${ALL_CHANNELS[@]}"; do
              [ "$other" = "$channel" ] && continue
              local other_name="librefang"
              [ "$other" != "stable" ] && other_name="librefang-${other}"
              conflicts="${conflicts}
            conflicts_with cask: \"${other_name}\""
            done

            # Livecheck only for stable channel
            local livecheck=""
            if [ "$channel" = "stable" ]; then
              livecheck='

            livecheck do
              url "https://github.com/librefang/librefang/releases/latest"
              strategy :header_match
            end'
            fi

            mkdir -p tap/Casks
            cat > "tap/Casks/${cask_name}.rb" <<CASK
          cask "${cask_name}" do
            arch arm: "aarch64", intel: "x64"

            version "${TAURI_VERSION}"

            on_arm do
              sha256 "${ARM_SHA}"
            end
            on_intel do
              sha256 "${X86_SHA}"
            end

            url "https://github.com/librefang/librefang/releases/download/${TAG}/LibreFang_#{version}_#{arch}.dmg",
                verified: "github.com/librefang/librefang/"
            name "${display_name}"
            desc "Community-Maintained Agent Operating System written in Rust${desc_suffix}"
            homepage "https://librefang.ai"
          ${conflicts}${livecheck}

            depends_on macos: ">= :ventura"

            app "LibreFang.app"

            zap trash: [
              "~/Library/Application Support/ai.librefang.desktop",
              "~/Library/Caches/ai.librefang.desktop",
              "~/Library/Preferences/ai.librefang.desktop.plist",
            ]
          end
          CASK

            echo "=== Cask: ${cask_name} ==="
            cat "tap/Casks/${cask_name}.rb"
          }

          for channel in "${CHANNELS[@]}"; do
            generate_cask "$channel"
          done

          # ── Versioned cask (pinned to this exact release) ──────────────
          # Allows: brew install --cask librefang@2026.4.2-beta7
          # These accumulate in the tap and are never overwritten.
          VERSIONED_NAME="librefang@${VERSION}"
          mkdir -p tap/Casks
          cat > "tap/Casks/${VERSIONED_NAME}.rb" <<CASK
          cask "${VERSIONED_NAME}" do
            arch arm: "aarch64", intel: "x64"

            version "${TAURI_VERSION}"

            on_arm do
              sha256 "${ARM_SHA}"
            end
            on_intel do
              sha256 "${X86_SHA}"
            end

            url "https://github.com/librefang/librefang/releases/download/${TAG}/LibreFang_#{version}_#{arch}.dmg",
                verified: "github.com/librefang/librefang/"
            name "LibreFang ${VERSION}"
            desc "Community-Maintained Agent Operating System written in Rust (pinned to ${VERSION})"
            homepage "https://librefang.ai"

            depends_on macos: ">= :ventura"

            app "LibreFang.app"

            zap trash: [
              "~/Library/Application Support/ai.librefang.desktop",
              "~/Library/Caches/ai.librefang.desktop",
              "~/Library/Preferences/ai.librefang.desktop.plist",
            ]
          end
          CASK

          echo "=== Versioned cask: ${VERSIONED_NAME} ==="
          cat "tap/Casks/${VERSIONED_NAME}.rb"

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          mkdir -p Casks
          git add .
          git commit -m "chore: update cask channels to ${{ env.RELEASE_TAG }}" || echo "No changes"
          git push

  # ═════════════════════════════════════════════════════════════════════════
  # Docker — from release-docker.yml
  # ═════════════════════════════════════════════════════════════════════════

  docker:
    name: Docker / ${{ matrix.platform }}
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    needs: [create_release]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            os: ubuntu-24.04
          - platform: linux/arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Extract version & platform slug
        id: meta
        run: |
          echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          platform=${{ matrix.platform }}
          echo "slug=${platform//\//-}" >> "$GITHUB_OUTPUT"
      - name: Build and push (single-arch digest)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/librefang/librefang
          cache-from: type=gha,scope=${{ steps.meta.outputs.slug }}
          cache-to: type=gha,mode=max,scope=${{ steps.meta.outputs.slug }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docker-digest-${{ steps.meta.outputs.slug }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Docker Manifest
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Extract version
        id: version
        run: |
          echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: docker-digest-*
          merge-multiple: true
      - name: Create and push multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          IMAGE=ghcr.io/librefang/librefang
          VERSION=${{ steps.version.outputs.version }}
          TAGS="-t $IMAGE:$VERSION -t $IMAGE:latest"
          # LTS releases also get :lts tag
          if echo "$VERSION" | grep -qE -- '\-lts'; then
            TAGS="$TAGS -t $IMAGE:lts"
          fi
          docker buildx imagetools create \
            $TAGS \
            $(printf "$IMAGE@sha256:%s " *)

  deploy_fly:
    name: Deploy to Fly.io
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    runs-on: ubuntu-latest
    needs: [docker-manifest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # v1
      - name: Deploy
        run: flyctl deploy --remote-only --config deploy/fly/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy_render:
    name: Deploy to Render
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    runs-on: ubuntu-latest
    needs: [docker-manifest]
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "No Render deploy hook configured, skipping"
            exit 0
          fi
          curl -sf "$RENDER_DEPLOY_HOOK_URL"

  # ═════════════════════════════════════════════════════════════════════════
  # Language SDKs — from release-sdk.yml
  # ═════════════════════════════════════════════════════════════════════════

  sdk_javascript:
    name: SDK / JavaScript (npm)
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    needs: [create_release]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/javascript
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Sync version from tag
        run: |
          VERSION="${RELEASE_TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Publishing @librefang/sdk@$VERSION"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
            echo "✓ ${PKG_NAME}@${PKG_VERSION} already published to npm, skipping"
          else
            NPM_TAG=""
            # Accept both canonical `-beta.N` (#3310) and legacy `-betaN`.
            if echo "$PKG_VERSION" | grep -qE -- '-(beta|rc)\.?[0-9]'; then
              NPM_TAG="--tag next"
            elif echo "$PKG_VERSION" | grep -qE -- '\-lts'; then
              NPM_TAG="--tag lts"
            fi
            npm publish --access public --ignore-scripts $NPM_TAG
          fi
          echo "- **npm**: https://www.npmjs.com/package/${PKG_NAME}/v/${PKG_VERSION}" >> $GITHUB_STEP_SUMMARY

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm config set registry https://npm.pkg.github.com
          PKG_VERSION=$(node -p "require('./package.json').version")
          GPR_TAG=""
          # Accept both canonical `-beta.N` (#3310) and legacy `-betaN`.
          if echo "$PKG_VERSION" | grep -qE -- '-(beta|rc)\.?[0-9]'; then
            GPR_TAG="--tag next"
          elif echo "$PKG_VERSION" | grep -qE -- '-lts'; then
            GPR_TAG="--tag lts"
          fi
          npm publish --access public --ignore-scripts $GPR_TAG 2>/dev/null || echo "✓ Already published to GitHub Packages, skipping"

  sdk_cli_npm:
    name: SDK / CLI npm (@librefang/cli)
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    needs: [create_release]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli-npm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Sync version from tag
        run: |
          VERSION="${RELEASE_TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Publishing @librefang/cli@$VERSION"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
            echo "✓ ${PKG_NAME}@${PKG_VERSION} already published, skipping"
          else
            NPM_TAG=""
            # Accept both canonical `-beta.N` (#3310) and legacy `-betaN`.
            if echo "$PKG_VERSION" | grep -qE -- '-(beta|rc)\.?[0-9]'; then
              NPM_TAG="--tag next"
            fi
            npm publish --access public --ignore-scripts $NPM_TAG
          fi
          echo "- **npm**: https://www.npmjs.com/package/${PKG_NAME}/v/${PKG_VERSION}" >> $GITHUB_STEP_SUMMARY

  sdk_python:
    name: SDK / Python (PyPI)
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    needs: [create_release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC trusted publishing to PyPI
      contents: read   # actions/checkout (job-level permissions block fully overrides top-level)
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Sync version from tag
        run: |
          VERSION="${RELEASE_TAG#v}"
          # PEP 440: convert -beta.1 → b1, -rc.1 → rc1 (canonical form, #3310);
          # also handle legacy -beta1 / -rc1; strip -lts (no PEP 440 equivalent).
          # Order matters: dot-form first, otherwise the no-dot rule converts
          # `-beta.1` → `b.1` (invalid PEP 440).
          PYPI_VERSION=$(echo "$VERSION" | sed 's/-beta\./b/; s/-rc\./rc/; s/-beta/b/; s/-rc/rc/; s/-lts//')
          sed -i "s/^version = .*/version = \"$PYPI_VERSION\"/" pyproject.toml
          echo "Publishing librefang-sdk==$PYPI_VERSION"
          grep '^version' pyproject.toml

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        # OIDC trusted publishing — configure at:
        # pypi.org/manage/project/librefang-sdk/settings/publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: sdk/python/dist/
          skip-existing: true

      - name: Output publish link
        run: |
          PYPI_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "- **PyPI**: https://pypi.org/project/librefang-sdk/${PYPI_VERSION}/" >> $GITHUB_STEP_SUMMARY

  sdk_rust:
    name: SDK / Rust (crates.io)
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    needs: [create_release]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Sync version from tag
        run: |
          VERSION="${RELEASE_TAG#v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" Cargo.toml
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          sed -i '/^\[dependencies\]/,/^```/ s/librefang = "[^"]*"/librefang = "'"$MAJOR_MINOR"'"/' README.md
          echo "Publishing librefang@$VERSION"
          grep '^version' Cargo.toml

      - name: Test
        run: cargo test

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        # Pre-flight skip-if-already-published. The previous guard used
        # `cargo search librefang --limit 1` which returns only the
        # latest *stable* version — prerelease tags (`-beta.N`) never
        # match, so the guard failed open and `cargo publish` then
        # exploded with `error: crate librefang@X already exists on
        # crates.io index` on every Release re-run for the same tag.
        # Hit the registry's read API directly: GET /api/v1/crates/<name>/<version>
        # returns 200 if that exact version exists, 404 if not — handles
        # both stable and prerelease versions identically.
        run: |
          set -euo pipefail
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -H 'User-Agent: librefang-release-yml (github.com/librefang/librefang)' \
            "https://crates.io/api/v1/crates/librefang/$VERSION")
          case "$HTTP" in
            200)
              echo "✓ librefang@$VERSION already published to crates.io, skipping"
              ;;
            404)
              cargo publish --allow-dirty
              ;;
            *)
              echo "::error::Unexpected HTTP $HTTP from crates.io for librefang/$VERSION"
              exit 1
              ;;
          esac
          echo "- **crates.io**: https://crates.io/crates/librefang/${VERSION}" >> $GITHUB_STEP_SUMMARY

  sdk_go:
    name: SDK / Go (tag)
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    needs: [create_release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
      - name: Create Go module tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          REPO="${{ github.repository }}"

          # Map CalVer to Go-compatible v0.YYYYMMDD.0 (keeps major=0, no /v2026 import path)
          # e.g. 2026.3.21 → v0.20260321.0, 2026.3.21-rc1 → v0.20260321.0-rc1
          YEAR=$(echo "$VERSION" | cut -d. -f1)
          MONTH=$(printf '%02d' "$(echo "$VERSION" | cut -d. -f2)")
          DD=$(echo "$VERSION" | cut -d. -f3 | sed 's/-.*//')
          PRERELEASE=$(echo "$VERSION" | grep -oE '\-.*' || true)
          GO_VERSION="0.${YEAR}${MONTH}${DD}.0${PRERELEASE}"
          GO_TAG="sdk/go/v${GO_VERSION}"

          # Check if tag already exists
          if gh api "repos/$REPO/git/refs/tags/$GO_TAG" &>/dev/null; then
            echo "Tag $GO_TAG already exists, skipping"
            exit 0
          fi

          # Get the commit SHA for this tag
          SHA=$(gh api "repos/$REPO/git/ref/tags/$RELEASE_TAG" --jq '.object.sha')

          # Create tag via API (avoids git push workflow permission issue)
          gh api "repos/$REPO/git/refs" \
            -f ref="refs/tags/$GO_TAG" \
            -f sha="$SHA"
          echo "✓ Published Go module tag: $GO_TAG (from $VERSION)"
          echo "- **Go**: https://pkg.go.dev/github.com/librefang/librefang/sdk/go@v${GO_VERSION}" >> $GITHUB_STEP_SUMMARY
