name: Release

# Unified release pipeline.
#
# Superseded:
# - release-create.yml
# - release-shell.yml
# - release-desktop.yml
# - release-docker.yml
# - release-sdk.yml
# - release-lts.yml
#
# Kept as a separate file (different trigger):
# - release-notify.yml
#
# Jobs are otherwise identical to the old per-workflow files; the only
# structural change is that each previous `wait_for_release` poll step
# is replaced by `needs: [create_release]`, so downstream jobs no longer
# spin on the GitHub API waiting for the release entry to appear.

on:
  push:
    tags:
      - "v*"
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      channel:
        description: |
          `current` reruns the release for the tag passed via `tag`,
          using the latest `main` HEAD as the source of truth so a
          hotfix landed after the tag re-publishes the same version.
          (Dispatch `--ref` MUST be `main` for `channel=current` —
          GitHub Actions reads the workflow YAML from the dispatched
          ref, so dispatching against an old tag would read a stale
          release.yml that does not know about this flow.)
          `stable/beta/rc/lts` kicks off `cargo xtask release --channel …`
          which opens a bump-version PR; merging that PR auto-tags and
          re-enters this workflow via the tag push. Mirrors `just release`.
        required: true
        type: choice
        default: current
        options:
          - current
          - stable
          - beta
          - rc
          - lts
      tag:
        description: |
          Required when `channel=current`. The release tag to re-publish
          (e.g. `v2026.5.8-beta.10`). The workflow will force-push this
          tag to `main` HEAD before re-publishing so the GitHub Release,
          binary artifacts, and SDK packages all line up. Ignored for
          other channels.
        required: false
        type: string
        default: ""

permissions:
  contents: write
  packages: write

# Single group for the whole release — a re-push of the same tag cancels
# the entire in-flight workflow. Cross-job independence is preserved by
# GitHub Actions default behaviour (jobs only block each other through
# explicit `needs`, which we only use where the old files already did).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Effective ref for source-using checkouts.
  # - tag push (normal release): use the pushed tag's frozen commit
  # - workflow_dispatch channel=current: use main HEAD so a hotfix
  #   landed after the tag re-publishes the same version
  # Other dispatch channels (stable/beta/rc/lts) only run bump_version,
  # which always wants main.
  RELEASE_REF: ${{ (github.event_name == 'workflow_dispatch' && inputs.channel == 'current') && 'refs/heads/main' || github.ref }}
  # Effective release tag name. For channel=current dispatches the
  # workflow runs from `main` (so GitHub reads release.yml fresh),
  # which makes `github.ref_name` "main" — useless for naming the
  # GitHub Release / artifact uploads / cache keys. The dispatcher
  # passes the real tag via `inputs.tag`, and every site that used
  # to read `github.ref_name` reads `env.RELEASE_TAG` instead.
  RELEASE_TAG: ${{ (github.event_name == 'workflow_dispatch' && inputs.channel == 'current') && inputs.tag || github.ref_name }}

jobs:
  # ═════════════════════════════════════════════════════════════════════════
  # workflow_dispatch channel=current: force-update the dispatched tag
  # to main HEAD before publishing. Without this step, the tag in the
  # GitHub Release would still point at the old (broken) commit even
  # though the binary artifacts and SDK packages are rebuilt from main.
  #
  # Operational note: this REWRITES the release tag's commit pointer.
  # Anyone who already fetched the old `vX → C1` mapping (mirrors,
  # third-party CI checking out the tag, Homebrew bottle pinning) will
  # observe the tag jumping to a new commit on next fetch. That is the
  # whole point of `channel=current` — we want vX to mean "main HEAD
  # at re-publish time" — but it is intentional, not accidental.
  #
  # Mechanics: if the tag is already at main HEAD, this is a no-op and
  # the dispatch run continues into create_release/publish normally.
  # Otherwise the force-push triggers a fresh `push: tags` run, the
  # `cancel-in-progress` concurrency rule cancels this dispatch run,
  # and the push run takes over the actual publishing — by then the
  # tag and main HEAD are the same commit, so RELEASE_REF resolves to
  # the same source either way.
  #
  # Race window during a force-push path: this job has no `needs:`
  # blocker on the publish jobs, so build_dashboard / package_* /
  # publish_* / docker / sdk jobs in this dispatch run start in
  # parallel with `sync_tag_to_main`. Some may finish (or partially
  # publish) before concurrency cancels the dispatch run. The follow-up
  # `push: tags` run then redoes the same publishes. We rely on each
  # publish step being idempotent for the same version: GitHub Release
  # uploads overwrite, and npm / PyPI / crates.io reject duplicate
  # publishes for an already-published version (handled as success in
  # the publish jobs). If you add a non-idempotent publish step, gate
  # it on `needs: sync_tag_to_main` to serialize behind this job.
  # ═════════════════════════════════════════════════════════════════════════

  sync_tag_to_main:
    name: Sync tag to main HEAD (channel=current)
    if: github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: refs/heads/main
          fetch-depth: 0
          # Token scope note: the secret is named HOMEBREW_TAP_TOKEN
          # because it was originally provisioned for pushing to the
          # external `librefang/homebrew-tap` repo. It is reused here
          # and in `bump_version` for write access to *this* repo
          # (PR creation and tag force-push). Rotate / scope changes
          # must keep `contents: write` on the main repo or this job
          # and the bump-PR flow break.
          #
          # Note: unlike #4813's first iteration, we do NOT need to
          # use a PAT to "trigger downstream workflows" here. The
          # whole release pipeline runs in this same dispatch run,
          # so the tag force-push only needs to update the GitHub
          # Release pointer afterwards — no chained `push: tags`
          # event is required. GITHUB_TOKEN would also work; we use
          # HOMEBREW_TAP_TOKEN for symmetry with bump_version.
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Force-update tag to main HEAD
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          MAIN_SHA=$(git rev-parse refs/heads/main)
          # `git rev-parse <tag>` resolves the tag's tip on the current
          # clone. Since we just checked out main with full depth, the
          # tag ref is present in the local repo (refs/tags/$TAG was
          # fetched as part of the default refspec).
          TAG_SHA=$(git rev-parse "refs/tags/$TAG^{commit}" 2>/dev/null || echo "")
          if [ "$TAG_SHA" = "$MAIN_SHA" ]; then
            echo "✓ Tag $TAG already at main HEAD ($MAIN_SHA); no force-push needed."
            echo "  This dispatch run will continue into create_release and publish."
            exit 0
          fi
          echo "Force-updating tag $TAG: $TAG_SHA → $MAIN_SHA"
          git tag -f "$TAG" "$MAIN_SHA"
          git push origin -f "refs/tags/$TAG"
          echo "::notice::Tag $TAG force-pushed to main HEAD ($MAIN_SHA). The resulting push event will trigger a fresh release run; this dispatch run is about to be cancelled by concurrency.cancel-in-progress."

  # ═════════════════════════════════════════════════════════════════════════
  # PR close → auto-tag (from release-create.yml)
  # ═════════════════════════════════════════════════════════════════════════

  tag_on_merge:
    name: Tag Release
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'chore/bump-version-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Extract tag from PR body and create
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          TAG=$(printf '%s' "$PR_BODY" | grep -oP '(?<=<!-- release-tag:)(v[^ ]+)(?= -->)' || true)
          if [ -z "$TAG" ]; then
            echo "No release-tag marker found, skipping"
            exit 0
          fi

          # Guard against PR-body markers that drifted from the actual
          # workspace version. Without this gate, a stale `<!-- release-tag: vX -->`
          # marker would tag the merge with vX while the binary inside reports
          # the workspace version, producing artifacts whose `librefang --version`
          # disagrees with the GitHub Release name. See #3545.
          # Scope to the [workspace.package] section so a future top-level
          # [package] block or any other left-anchored `version = ...` line
          # cannot shadow the real workspace version.
          WS_VERSION=$(sed -n '/^\[workspace\.package\]/,/^\[/{ s/^version *= *"\([^"]*\)".*/\1/p }' Cargo.toml | head -1)
          if [ "${TAG#v}" != "$WS_VERSION" ]; then
            echo "::error::PR-body release-tag $TAG does not match [workspace.package].version $WS_VERSION"
            exit 1
          fi

          echo "Creating tag $TAG on main"
          git tag "$TAG"
          git push origin "$TAG"

  # ═════════════════════════════════════════════════════════════════════════
  # workflow_dispatch channel=stable/beta/rc/lts → run the same flow as
  # `just release`: compute the next tag for the chosen channel and open a
  # bump-version PR. Merging that PR auto-tags (see `tag_on_merge`) and the
  # tag push re-enters this workflow via `create_release` and the rest of
  # the graph.
  #
  # channel=current takes a different path: it does not run this job at all,
  # and instead the `workflow_dispatch && inputs.channel == 'current'` arm
  # of every tag-driven job reuses `github.ref` (the tag you picked with
  # `gh workflow run Release --ref <tag>`) to re-publish without retagging.
  # ═════════════════════════════════════════════════════════════════════════

  bump_version:
    name: Bump Version (${{ inputs.channel }})
    if: github.event_name == 'workflow_dispatch' && inputs.channel != 'current'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0
          # PAT (not GITHUB_TOKEN) is required so the PR is opened by a
          # user account and `release: published` events on the
          # subsequent tag can trigger downstream workflows. Same reason
          # `create_release` uses HOMEBREW_TAP_TOKEN.
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Run xtask release
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # --no-article: skip Dev.to article generation (CI runner has no
          # Claude CLI and we don't want to gate releases on it).
          # --no-confirm + --channel: non-interactive version pick.
          cargo xtask release --no-confirm --no-article --channel ${{ inputs.channel }}

  # ═════════════════════════════════════════════════════════════════════════
  # Tag push → create GitHub Release entry (from release-create.yml)
  # All other tag-driven jobs `needs: [create_release]`.
  # ═════════════════════════════════════════════════════════════════════════

  create_release:
    name: Create Release
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      # Block any tag whose stripped form does not match
      # `[workspace.package].version` in Cargo.toml. A mismatch means the
      # CHANGELOG `awk` extractor below silently falls through to the generic
      # "See CHANGELOG..." note, the Homebrew formula version (derived from
      # `${TAG#v}` further down the workflow) drifts from `librefang --version`,
      # and downstream consumers ship inconsistent metadata. See #3545.
      - name: Verify tag matches workspace version
        run: |
          TAG="$RELEASE_TAG"
          # Scope to the [workspace.package] section so a future top-level
          # [package] block or any other left-anchored `version = ...` line
          # cannot shadow the real workspace version.
          WS_VERSION=$(sed -n '/^\[workspace\.package\]/,/^\[/{ s/^version *= *"\([^"]*\)".*/\1/p }' Cargo.toml | head -1)
          if [ "${TAG#v}" != "$WS_VERSION" ]; then
            echo "::error::pushed tag $TAG does not match [workspace.package].version $WS_VERSION"
            exit 1
          fi
          echo "Tag $TAG matches workspace version $WS_VERSION"

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="$RELEASE_TAG"
          VERSION="${TAG#v}"
          # Strip pre-release suffix (-betaN / -rcN) for CHANGELOG lookup
          VERSION=$(echo "$VERSION" | sed 's/-.*//')

          # Extract this version's changelog section
          CHANGES=$(awk '/^## \['"$VERSION"'\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md)

          if [ -z "$CHANGES" ]; then
            CHANGES="See [CHANGELOG](https://github.com/librefang/librefang/blob/main/CHANGELOG.md) for details."
          fi

          # Write to file for multiline output
          echo "$CHANGES" > /tmp/changelog.md

      # Use HOMEBREW_TAP_TOKEN (PAT) instead of GITHUB_TOKEN so that the
      # `release: published` event fires downstream workflows. Releases
      # created by GITHUB_TOKEN do NOT trigger any subsequent workflow runs,
      # which is why dashboard-build.yml's `release: published` trigger
      # never fired for past releases — leaving beta14 without its
      # `dashboard-dist.tar.gz` asset for ~9 hours after publish (#2091).
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="$RELEASE_TAG"

          {
            echo "## Full Changelog"
            echo ""
            cat /tmp/changelog.md
            echo ""
            echo "<details>"
            echo "<summary>Install / Upgrade</summary>"
            echo ""
            echo '**Homebrew (macOS):**'
            echo '```bash'
            echo 'brew tap librefang/tap'
            echo 'brew install librefang              # CLI (stable)'
            echo 'brew install librefang-beta         # CLI (beta channel)'
            echo 'brew install librefang-rc           # CLI (rc channel)'
            echo 'brew install --cask librefang       # Desktop (stable)'
            echo 'brew install --cask librefang-beta  # Desktop (beta channel)'
            echo 'brew install --cask librefang-rc    # Desktop (rc channel)'
            echo '```'
            echo ""
            echo '**CLI (Linux/macOS):** `curl -fsSL https://librefang.ai/install.sh | sh`'
            echo ""
            echo '**npm:** `npm install -g @librefang/cli` &nbsp;·&nbsp; **pip:** `pip install librefang` &nbsp;·&nbsp; **cargo:** `cargo install librefang`'
            echo ""
            echo '**Docker:** `docker pull ghcr.io/librefang/librefang:latest`'
            echo ""
            echo '**Coming from OpenClaw / OpenFang?** `librefang migrate --from openclaw` (or `--from openfang`)'
            echo ""
            echo "</details>"
            echo ""
            echo "[Documentation](https://librefang.ai) &nbsp;·&nbsp; [Discord](https://discord.gg/DzTYqAZZmc) &nbsp;·&nbsp; [Contributing Guide](https://github.com/librefang/librefang/blob/main/CONTRIBUTING.md)"
            echo ""
            PREV=$(git tag --sort=-creatordate | grep -E '^v[0-9]' | grep -v "$TAG" | head -1)
            if [ -n "$PREV" ]; then
              echo "---"
              echo "**Full diff:** https://github.com/librefang/librefang/compare/${PREV}...${TAG}"
            fi
          } > /tmp/release-body.md

          # LTS releases get a special label
          if echo "$TAG" | grep -qE -- '\-lts$'; then
            # v2026.3.0-lts -> release/2026.3
            LTS_BASE="${TAG#v}"
            LTS_BASE="${LTS_BASE%-lts}"
            LTS_BRANCH="$(echo "$LTS_BASE" | cut -d. -f1,2)"
            echo "" >> /tmp/release-body.md
            echo "> **LTS Release** — this version receives long-term security and bug fixes on the \`release/${LTS_BRANCH}\` branch." >> /tmp/release-body.md
          fi

          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, updating..."
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release-body.md
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release-body.md
          fi

  # ═════════════════════════════════════════════════════════════════════════
  # LTS branch (from release-lts.yml)
  # Only fires on v*-lts tags.
  # ═════════════════════════════════════════════════════════════════════════

  create_lts_branch:
    name: Create LTS Branch
    if: >
      ((github.event_name == 'push') ||
       (github.event_name == 'workflow_dispatch' && inputs.channel == 'current'))
      && startsWith(github.ref, 'refs/tags/v')
      && endsWith(github.ref, '-lts')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - name: Create release branch (only for .0-lts)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$RELEASE_TAG"
          # Extract: v2026.3.0-lts -> 2026.3.0
          BASE="${TAG#v}"
          BASE="${BASE%-lts}"
          # YYYY.M from YYYY.M.PATCH
          YEAR_MONTH="$(echo "$BASE" | cut -d. -f1,2)"
          PATCH="$(echo "$BASE" | cut -d. -f3)"
          BRANCH="release/$YEAR_MONTH"

          # Only create branch for patch 0 (initial LTS)
          if [ "$PATCH" != "0" ]; then
            echo "Patch tag ($TAG), branch $BRANCH should already exist"
            exit 0
          fi

          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Branch $BRANCH already exists, skipping"
          else
            echo "Creating LTS branch: $BRANCH from $TAG"
            git checkout -b "$BRANCH" "$TAG"
            git push origin "$BRANCH"
            echo "✓ Created $BRANCH"
          fi

          # Protect the branch
          gh api repos/${{ github.repository }}/branches/$BRANCH/protection \
            -X PUT \
            -f "required_pull_request_reviews[dismiss_stale_reviews]=true" \
            -f "required_pull_request_reviews[required_approving_review_count]=1" \
            -f "enforce_admins=false" \
            -f "restrictions=null" \
            -f "required_status_checks=null" \
            2>/dev/null || echo "::warning::Could not set branch protection (may need admin token)"

  # ═════════════════════════════════════════════════════════════════════════
  # Shared build: React dashboard (from release-shell.yml)
  # Uploaded as `dashboard-dist` artifact and pulled in by every CLI job.
  # ═════════════════════════════════════════════════════════════════════════

  build_dashboard:
    name: Build Dashboard
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: crates/librefang-api/dashboard
        run: pnpm install --frozen-lockfile --config.strict-dep-builds=false
      - name: Build dashboard
        working-directory: crates/librefang-api/dashboard
        run: pnpm run build
      - name: Upload dashboard artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dashboard-dist
          path: crates/librefang-api/static/react/
          retention-days: 1

  # ═════════════════════════════════════════════════════════════════════════
  # CLI binaries (from release-shell.yml)
  # ═════════════════════════════════════════════════════════════════════════

  cli_mac:
    name: CLI / ${{ matrix.target }}
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    needs: [create_release, build_dashboard]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
          - target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dashboard-dist
          path: crates/librefang-api/static/react/
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: cli-${{ matrix.target }}-${{ env.RELEASE_TAG }}
          # Cache the kernel workspace AND the sidecar's separate target/.
          workspaces: |
            .
            sdk/rust/librefang-sidecar-telegram
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} --bin librefang
      - name: Build Telegram sidecar
        # Separate cargo workspace → separate target/ under the manifest dir.
        run: cargo build --release --target ${{ matrix.target }} --manifest-path sdk/rust/librefang-sidecar-telegram/Cargo.toml
      - name: Ad-hoc codesign
        run: |
          xattr -cr target/${{ matrix.target }}/release/librefang || true
          codesign --force --sign - target/${{ matrix.target }}/release/librefang
          SIDECAR=sdk/rust/librefang-sidecar-telegram/target/${{ matrix.target }}/release/librefang-sidecar-telegram
          xattr -cr "$SIDECAR" || true
          codesign --force --sign - "$SIDECAR"
      - name: Package
        run: |
          cp sdk/rust/librefang-sidecar-telegram/target/${{ matrix.target }}/release/librefang-sidecar-telegram target/${{ matrix.target }}/release/librefang-sidecar-telegram
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}.tar.gz librefang librefang-sidecar-telegram
          cd ../../..
          shasum -a 256 librefang-${{ matrix.target }}.tar.gz > librefang-${{ matrix.target }}.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$RELEASE_TAG"
          for attempt in $(seq 1 5); do
            if gh release upload "$TAG" librefang-${{ matrix.target }}.* --clobber; then
              echo "✓ Upload succeeded (attempt $attempt)"
              exit 0
            fi
            echo "Upload failed (attempt $attempt/5), retrying in 10s..."
            sleep 10
          done
          echo "::error::Upload failed after 5 attempts"
          exit 1

  cli_linux:
    name: CLI / ${{ matrix.target }}
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.channel == 'current' && startsWith(inputs.tag, 'v'))
    needs: [create_release, build_dashboard]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            use_cross: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_REF }}
